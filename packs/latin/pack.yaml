id: latin
display_name: Latin
bcp47: la
version: 0.1.0

kind: historical

capabilities:
  place_conversion: true
  place_generation: false
  person_conversion: false
  person_generation: false
  historical_dates: true

output_scripts:
  - Latn

eras:
  - id: antique
    label: Antiquity
    start: "-0750-01-01"
    end: "0476-12-31"
  - id: medieval
    label: Medieval
    start: "0477-01-01"
    end: "1499-12-31"
  - id: neolatin
    label: Neo-Latin
    start: "1500-01-01"
    end: "2100-12-31"

default_era: medieval

pipeline:
  - step: entity_lookup
    namespaces: [geonames, wikidata]

  - step: string_exonym

  - step: geonames_source
    merge: true
    languages: [la]
    use_historic_dates: true
    allow_untyped: false

  - step: icu_transliteration
    transform: "Any-Latin; NFD; [:Mn:] Remove; NFC"

  - step: uroman

ranking:
  entity_lookup_hit: 10000
  string_exonym_hit: 500
  geonames_la_tag: 300
  geonames_historic_flag: 40

  date_overlap: 120

  geonames_untyped: -120
  transliteration_output: -500
